<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>NovaX AI</title>
  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      text-align: center;
    }

    #chat {
      width: 90%;
      max-width: 500px;
      height: 400px;
      margin: 20px auto;
      background: #1e293b;
      padding: 10px;
      overflow-y: auto;
      border-radius: 10px;
      text-align: left;
    }

    input {
      width: 70%;
      padding: 10px;
      border-radius: 5px;
      border: none;
    }

    button {
      padding: 10px;
      border: none;
      background: #22c55e;
      color: white;
      border-radius: 5px;
      cursor: pointer;
    }

    .msg {
      margin: 5px 0;
    }

    .user {
      color: #38bdf8;
    }

    .ai {
      color: #4ade80;
    }
  </style>
</head>
<body>

<h2>NovaX AI 🤖</h2>

<div id="chat"></div>

<input id="input" type="text" placeholder="Type message...">
<button onclick="sendMessage()">Send</button>

<script src="script.js"></script>

</body>
</html>
