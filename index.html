<!DOCTYPE html>
<html>
<head>
  <title>NovaX AI</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f172a;
      color: white;
    }

    .header {
      padding: 15px;
      background: #1e293b;
      text-align: center;
      font-size: 20px;
      font-weight: bold;
    }

    #chatBox {
      height: 80vh;
      overflow-y: auto;
      padding: 10px;
    }

    .msg {
      padding: 10px;
      margin: 8px 0;
      border-radius: 10px;
      max-width: 75%;
      word-wrap: break-word;
    }

    .user {
      background: #3b82f6;
      margin-left: auto;
      text-align: right;
    }

    .bot {
      background: #334155;
      margin-right: auto;
    }

    .inputArea {
      position: fixed;
      bottom: 0;
      width: 100%;
      display: flex;
      padding: 10px;
      background: #1e293b;
      box-sizing: border-box;
    }

    input {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: 6px;
      outline: none;
    }

    button {
      margin-left: 10px;
      padding: 12px 18px;
      background: #22c55e;
      border: none;
      color: white;
      border-radius: 6px;
      cursor: pointer;
    }

    button:hover {
      background: #16a34a;
    }
  </style>
</head>

<body>

<div class="header">🤖 NovaX AI</div>

<div id="chatBox"></div>

<div class="inputArea">
  <input type="text" id="userInput" placeholder="Type your message..." />
  <button onclick="sendMessage()">Send</button>
</div>

<script>
async function sendMessage() {
  let input = document.getElementById("userInput");
  let text = input.value.trim();

  if (!text) return;

  let chatBox = document.getElementById("chatBox");

  // User message
  chatBox.innerHTML += <div class='msg user'>${text}</div>;
  input.value = "";

  // Loading message
  let loading = document.createElement("div");
  loading.className = "msg bot";
  loading.innerText = "Thinking...";
  chatBox.appendChild(loading);
  chatBox.scrollTop = chatBox.scrollHeight;

  try {
    let res = await fetch(
      "https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=YOUR_API_KEY",
      {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          contents: [
            {
              parts: [{ text: text }]
            }
          ]
        })
      }
    );

    let data = await res.json();

    let reply =
      data.candidates?.[0]?.content?.parts?.[0]?.text ||
      "No response from AI";

    loading.innerText = reply;

  } catch (error) {
    console.log(error);
    loading.innerText = "Error: AI not responding";
  }

  chatBox.scrollTop = chatBox.scrollHeight;
}
</script>

</body>
</html>
<script>
function sendMessage() {
  let msg = document.getElementById("msg").value;

  document.getElementById("chat").innerHTML += 
    "<p>You: " + msg + "</p>";

  document.getElementById("chat").innerHTML += 
    "<p>NovaX AI: Hello! I got your message</p>";

  document.getElementById("msg").value = "";
}
</script>
