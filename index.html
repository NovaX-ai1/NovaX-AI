<!DOCTYPE html>
<html>
<head>
  <title>NovaX AI</title>

  <style>
    body {
      font-family: Arial;
      background: #f2f2f2;
    }

    #chatBox {
      height: 400px;
      overflow-y: auto;
      padding: 10px;
      background: white;
      margin-bottom: 10px;
      border-radius: 10px;
    }

    .msg {
      padding: 8px;
      margin: 5px;
      border-radius: 10px;
      max-width: 70%;
    }

    .user {
      background: #d1e7ff;
      margin-left: auto;
      text-align: right;
    }

    .ai {
      background: #e6ffe6;
      margin-right: auto;
    }
  </style>

</head>
<body>

<h2>NovaX AI 🚀</h2>

<div id="chatBox"></div>

<input id="input" placeholder="Type here..." style="padding:10px;width:70%">
<button onclick="send()">Send</button>

<script src="script.js"></script>

</body>
</html>
