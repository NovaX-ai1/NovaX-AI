<script>
async function sendMessage() {
  let input = document.getElementById("userInput");
  let text = input.value;
  if (text === "") return;

  let chatBox = document.getElementById("chatBox");

  chatBox.innerHTML += <div class='msg user'>${text}</div>;
  input.value = "";

  chatBox.innerHTML += <div class='msg bot'>Thinking...</div>;

  let res = await fetch("https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent?key=YOUR_API_KEY", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      contents: [{ parts: [{ text: text }] }]
    })
  });

  let data = await res.json();
  let reply = data.candidates?.[0]?.content?.parts?.[0]?.text || "Error";

  chatBox.innerHTML += <div class='msg bot'>${reply}</div>;
}
</script>
