<!DOCTYPE html>
<html>
<head>
  <title>NovaX AI</title>
  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      margin: 0;
      padding: 0;
    }

    .header {
      background: #1e293b;
      padding: 15px;
      text-align: center;
      font-size: 20px;
      font-weight: bold;
    }

    #chatBox {
      height: 80vh;
      overflow-y: auto;
      padding: 10px;
    }

    .msg {
      margin: 10px 0;
      padding: 10px;
      border-radius: 10px;
      max-width: 70%;
    }

    .user {
      background: #3b82f6;
      margin-left: auto;
      text-align: right;
    }

    .bot {
      background: #334155;
      margin-right: auto;
    }

    .inputArea {
      display: flex;
      position: fixed;
      bottom: 0;
      width: 100%;
      background: #1e293b;
      padding: 10px;
    }

    input {
      flex: 1;
      padding: 10px;
      border: none;
      border-radius: 5px;
    }

    button {
      padding: 10px;
      margin-left: 10px;
      background: #22c55e;
      border: none;
      color: white;
      border-radius: 5px;
    }
  </style>
</head>

<body>

<div class="header">🤖 NovaX AI</div>

<div id="chatBox"></div>

<div class="inputArea">
  <input type="text" id="userInput" placeholder="Type here..." />
  <button onclick="sendMessage()">Send</button>
</div>

<script>
function sendMessage() {
  let input = document.getElementById("userInput");
  let text = input.value;

  if (text === "") return;

  let chatBox = document.getElementById("chatBox");

  // User message
  chatBox.innerHTML += <div class='msg user'>${text}</div>;

  // Bot reply
  setTimeout(() => {
    chatBox.innerHTML += <div class='msg bot'>NovaX AI: Tum ne kaha "${text}"</div>;
    chatBox.scrollTop = chatBox.scrollHeight;
  }, 500);

  input.value = "";
}
</script>

</body>
</html>
